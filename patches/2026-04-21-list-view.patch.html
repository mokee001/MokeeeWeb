<style>
/* ===== LIST VIEW (replicates marioroudil.com list mode, dark theme) ===== */
.list-view {
  position: fixed;
  inset: 0;
  z-index: 8;
  background: #000000;
  color: #ffffff;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  padding: 120px 40px 140px;
  overflow-y: auto;
  overflow-x: hidden;
  opacity: 0;
  visibility: hidden;
  transition: opacity 800ms cubic-bezier(0.16, 1, 0.3, 1),
              visibility 0s linear 800ms;
}
body.list-mode .list-view {
  opacity: 1;
  visibility: visible;
  transition: opacity 800ms cubic-bezier(0.16, 1, 0.3, 1),
              visibility 0s linear 0s;
}
.list-view__inner {
  max-width: 1800px;
  margin: 0 auto;
  position: relative;
}
.list-view__row {
  display: grid;
  grid-template-columns: 56px minmax(240px, 1.4fr) 2.4fr minmax(240px, 1.4fr) 110px;
  align-items: baseline;
  gap: 24px;
  padding: 6px 0;
  text-decoration: none;
  color: inherit;
  cursor: pointer;
  line-height: 1.25;
  /* Enter/exit base: rows start translated down + transparent */
  opacity: 0;
  transform: translateY(18px);
  transition: opacity 800ms cubic-bezier(0.16, 1, 0.3, 1),
              transform 800ms cubic-bezier(0.16, 1, 0.3, 1);
  transition-delay: 0ms;
}
body.list-mode .list-view__row {
  opacity: 1;
  transform: translateY(0);
  /* Stagger via --i (set inline by JS); keep total within 800ms window */
  transition-delay: calc(var(--i, 0) * 14ms);
}
.list-view__row > span {
  transition: background-color 0.18s ease, color 0.18s ease;
  padding: 2px 6px;
  margin: -2px -6px;
  border-radius: 1px;
}
/* Hovered row: invert each text cell to a white block with black text */
.list-view__row:hover .list-view__index,
.list-view__row:hover .list-view__title,
.list-view__row:hover .list-view__sub,
.list-view__row:hover .list-view__date {
  background-color: #ffffff;
  color: #000000;
}
.list-view__index { font-variant-numeric: tabular-nums; font-weight: 400; }
.list-view__title { font-weight: 500; justify-self: start; }
.list-view__spacer { /* empty middle column reserved for floating preview */ }
.list-view__sub { text-align: right; font-weight: 400; justify-self: end; }
.list-view__date { text-align: right; font-variant-numeric: tabular-nums; font-weight: 400; justify-self: end; }
/* Floating preview image follows hovered row, sits in the middle column */
.list-view__preview {
  position: absolute;
  pointer-events: none;
  width: 380px;
  height: 230px;
  object-fit: cover;
  opacity: 0;
  transform: translate(-50%, -50%);
  transition: opacity 260ms ease, top 320ms cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 2;
  background: #111;
}
.list-view__preview.show { opacity: 1; }

/* === Mode switch transitions for grid layer === */
#canvas {
  transition: filter 800ms cubic-bezier(0.16, 1, 0.3, 1),
              opacity 800ms cubic-bezier(0.16, 1, 0.3, 1),
              transform 800ms cubic-bezier(0.16, 1, 0.3, 1);
}
.bottom-gradient-blur {
  transition: transform 800ms cubic-bezier(0.16, 1, 0.3, 1),
              opacity 800ms cubic-bezier(0.16, 1, 0.3, 1);
}
body.list-mode #canvas {
  opacity: 0;
  filter: blur(48px);
  transform: scale(1.04);
  pointer-events: none;
}
body.list-mode .bottom-gradient-blur {
  opacity: 0;
  transform: translateY(120px);
  pointer-events: none;
}

/* ===== VIEW TOGGLE (centered in top bar) ===== */
.view-toggle {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  z-index: 1;
  display: flex; align-items: center; gap: 4px;
  font-family: 'Inter', sans-serif;
  font-size: 11px; letter-spacing: 0.12em;
  text-transform: uppercase;
  pointer-events: auto;
}
.view-toggle button {
  font-family: inherit; font-size: inherit;
  letter-spacing: inherit;
  background: none; border: none;
  color: var(--fg-dim); cursor: pointer;
  padding: 6px 8px; transition: color 0.3s;
}
.view-toggle button:hover { color: var(--fg); }
.view-toggle button.active { color: var(--fg); }
.view-toggle span { color: var(--fg-muted); padding: 0 2px; }
</style>

<script>
/* ===== LIST VIEW: populate + GRID/LIST toggle + hover preview ===== */

    { title: 'TRAILER ANNONCE — 23 MEGAPARTY 26/05', sub: 'MARIO ROUDIL', date: '18.03.2025' },
    { title: 'COMME LA BÊTE.', sub: 'ADVM', date: '29.01.2025' },

    { title: 'NOTRE DAME', sub: 'TIAKOLA X GAZO X ANGELE', date: '29.06.2024' },
    { title: 'COMBAT INTERNATIONALE DE BOXE ANGLAISE', sub: 'GAZO X BAKARY', date: '16.05.2024' },
    { title: 'TÉNÉBREUX', sub: 'DI-MEH', date: '10.05.2024' },
    { title: 'PARFUM ROCHAS AUDACE', sub: 'CAMILLE MONTAGNAC', date: '23.04.2024' },
    { title: 'CELIO X UFC', sub: 'CELIO', date: '17.03.2024' },
    { title: 'BABY', sub: 'PIERRE PLEURE', date: '14.02.2024' },
    { title: 'SHAKE (UNRELEASED)', sub: 'SLIMKA', date: '20.12.2023' },
    { title: 'SLOW DOWN', sub: 'SLIMKA', date: '20.12.2023' },
    { title: 'JAMAIS COMME LES AUTRES', sub: 'SLIMKA', date: '30.11.2023' },
    { title: "L'ÉCHAPÉE — MAKING OF", sub: 'DOMINGO', date: '20.10.2023' },
    { title: 'CHAINE OU LAINE', sub: "RY'S", date: '01.10.2023' },
    { title: 'DANS LA ZONE', sub: 'INOXTAG', date: '30.12.2022' },
    { title: 'COMME AVANT', sub: "L'ENFANT", date: '25.11.2022' },
    { title: 'LE DESSERT', sub: 'NIKON FILM FESTIVAL', date: '19.11.2022' },
    { title: 'PLUS PEUR', sub: 'PIERRE PLEURE', date: '13.09.2022' },
    { title: 'GARE PART DIEU', sub: 'RICHI', date: '08.08.2022' },
    { title: 'CLASSER MES IDÉES', sub: 'J9UEVE', date: '04.07.2022' },
    { title: 'LE JOUR SE LÈVE', sub: "L'ENFANT", date: '19.05.2022' },
    { title: 'VIOLETTE & CITRONELLE', sub: 'ALKPOTE', date: '05.05.2022' },
    { title: 'SMOKE !', sub: "RY'S", date: '22.12.2021' },
    { title: 'CIEL ÉTEINT', sub: 'RICHI', date: '03.10.2021' },
    { title: 'FREESTYLE RÈGLEMENT', sub: 'LUV RESVAL', date: '08.05.2021' },
  ];

  const inner = document.getElementById('listViewInner');
  const preview = document.getElementById('listViewPreview');
  const listSection = document.querySelector('.list-view');

  // Build rows
  const frag = document.createDocumentFragment();
  PROJECT_ROWS.forEach((p, i) => {
    const a = document.createElement('a');
    a.className = 'list-view__row';
    a.href = '#';
    a.style.setProperty('--i', i);
    const idx = String(i).padStart(2, '0');
    const seed = encodeURIComponent(p.title.toLowerCase().replace(/\s+/g, '-')).slice(0, 24);
    const imgUrl = `https://picsum.photos/seed/${seed}/720/440`;
    a.dataset.preview = imgUrl;
    a.innerHTML =
      `<span class="list-view__index">${idx}</span>` +
      `<span class="list-view__title"></span>` +
      `<span class="list-view__spacer"></span>` +
      `<span class="list-view__sub"></span>` +
      `<span class="list-view__date"></span>`;
    a.children[1].textContent = p.title;
    a.children[3].textContent = p.sub;
    a.children[4].textContent = p.date;
    a.addEventListener('click', (e) => e.preventDefault());
    a.addEventListener('mouseenter', () => {
      const rect = a.getBoundingClientRect();
      const innerRect = inner.getBoundingClientRect();
      const cy = rect.top - innerRect.top + rect.height / 2;
      const cx = innerRect.width / 2;
      preview.style.left = cx + 'px';
      preview.style.top = cy + 'px';
      if (preview.src !== imgUrl) preview.src = imgUrl;
      preview.classList.add('show');
    });
    a.addEventListener('mouseleave', () => {
      preview.classList.remove('show');
    });
    frag.appendChild(a);
  });
  inner.insertBefore(frag, preview);

  // Toggle wiring with proper enter/exit transitions
  const buttons = document.querySelectorAll('.view-toggle button');
  let switching = false;
  function setMode(mode) {
    if (switching) return;
    const current = document.body.classList.contains('list-mode') ? 'list' : 'grid';
    if (current === mode) return;
    switching = true;
    document.body.classList.toggle('list-mode', mode === 'list');
    buttons.forEach((b) => b.classList.toggle('active', b.dataset.view === mode));
    listSection.setAttribute('aria-hidden', mode === 'list' ? 'false' : 'true');
    preview.classList.remove('show');
    if (mode === 'list') listSection.scrollTop = 0;
    setTimeout(() => { switching = false; }, 1300);
  }
  buttons.forEach((b) => {
    b.addEventListener('click', () => setMode(b.dataset.view));
  });
})();
</script>
